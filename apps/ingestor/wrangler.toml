name = "odyssey-llm-wiki-ingestor"
main = "src/index.ts"
compatibility_date = "2026-04-13"

[[queues.consumers]]
queue = "odyssey-llm-wiki-ingestion-queue"
max_batch_size = 10
max_batch_timeout = 30

[[d1_databases]]
binding = "DB"
database_name = "odyssey-llm-wiki-db"
database_id = "PASTE_D1_DATABASE_ID_HERE"

[[r2_buckets]]
binding = "RAW_SOURCES"
bucket_name = "odyssey-llm-wiki-raw-sources"

[[r2_buckets]]
binding = "WIKI_PAGES"
bucket_name = "odyssey-llm-wiki-pages"

[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "odyssey-llm-wiki-index"

[ai]
binding = "AI"
