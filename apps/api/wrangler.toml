name = "odyssey-llm-wiki-api"
main = "src/index.ts"
compatibility_date = "2024-04-03"

[[d1_databases]]
binding = "DB"
database_name = "odyssey-llm-wiki-db"
database_id = "PASTE_D1_DATABASE_ID_HERE"

[[r2_buckets]]
binding = "RAW_SOURCES"
bucket_name = "odyssey-llm-wiki-raw-sources"

[[r2_buckets]]
binding = "WIKI_PAGES"
bucket_name = "odyssey-llm-wiki-pages"

[[queues.producers]]
queue = "odyssey-llm-wiki-ingestion-queue"
binding = "INGESTION_QUEUE"
